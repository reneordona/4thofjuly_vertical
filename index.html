    const blobUrls = {};

      const entry = manifest[uuid];

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ly: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"463c4e11-4eb9-4605-909d-8209c1d7bef2\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Sans 3';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"56b2c727-93b9-407d-84e1-e7201cc20204\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html,body { margin:0; height:100%; background:#000; overflow:hidden; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#000; overflow:hidden;\">\n  <div id=\"stage\" style=\"position:relative; width:1280px; height:720px; overflow:hidden; background:#081428; transform-origin:center center;\">\n    <div style=\"position:absolute; left:50%; top:50%; width:720px; height:1280px; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center center;\">\n      <div style=\"position:relative; width:720px; height:1280px; overflow:hidden; background:#081428;\">\n        <canvas id=\"bgRot\" style=\"position:absolute; inset:0; width:100%; height:100%; display:block;\"><\u002Fcanvas>\n        <div style=\"position:absolute; inset:0; background:linear-gradient(180deg, rgba(6,16,34,.52) 0%, rgba(6,16,34,.12) 24%, rgba(6,16,34,.16) 56%, rgba(6,16,34,.84) 100%);\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; padding:72px 64px 112px;\">\n          <img src=\"b148ab8d-dea6-4fd9-a7c5-c9ec7efd6c63\" alt=\"Housing Authority of the City of Long Beach\" style=\"height:122px; width:auto; align-self:flex-start; flex:0 0 auto; display:block; filter:drop-shadow(0 3px 14px rgba(0,0,0,.55));\">\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <div>\n            <div style=\"color:#D4AF37; font:600 21px/1 'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.36em; margin-bottom:22px;\">Office Closure Notice<\u002Fdiv>\n            <h1 style=\"margin:0 0 28px; font:700 116px/0.9 'Oswald',sans-serif; color:#fff; text-transform:uppercase; letter-spacing:.01em; text-shadow:0 6px 30px rgba(0,0,0,.5);\">Happy<br>4<span style=\"font-size:0.56em; vertical-align:0.55em;\">TH<\u002Fspan> of July<\u002Fh1>\n            <div style=\"display:flex; height:6px; width:240px; margin:0 0 30px; border-radius:3px; overflow:hidden;\">\n              <span style=\"flex:1; background:#B22234;\"><\u002Fspan>\n              <span style=\"flex:1; background:#fff;\"><\u002Fspan>\n              <span style=\"flex:1; background:#1d4ea0;\"><\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0; max-width:600px; font:400 30px/1.5 'Source Sans 3',sans-serif; color:#eaf0fa; text-wrap:pretty; text-shadow:0 2px 12px rgba(0,0,0,.55);\">In observance of Independence Day, our offices will be closed on <strong style=\"font-weight:700; color:#fff;\">Friday, July 3rd, 2026<\u002Fstrong>. We will reopen on <strong style=\"font-weight:700; color:#fff;\">Monday, July 6<\u002Fstrong>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._fitBound = () => this._fit();\n    this._fit();\n    window.addEventListener('resize', this._fitBound);\n    this._setup();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._fitBound);\n    if (this._raf) cancelAnimationFrame(this._raf);\n  }\n  _fit() {\n    const s = document.getElementById('stage');\n    if (!s) return;\n    const k = Math.min(window.innerWidth / 1280, window.innerHeight / 720);\n    s.style.transform = 'scale(' + k + ')';\n  }\n  _mkStars(n, W, H) {\n    const a = [];\n    for (let i = 0; i < n; i++) a.push({ x: Math.random() * W, y: Math.random() * H, r: 2 + Math.random() * 2.4, ph: Math.random() * 6.28 });\n    return a;\n  }\n  _star(x, cx, cy, r) {\n    x.beginPath();\n    for (let i = 0; i < 5; i++) {\n      const a = -Math.PI / 2 + i * 2 * Math.PI / 5;\n      const ai = a + Math.PI / 5;\n      x.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);\n      x.lineTo(cx + Math.cos(ai) * r * 0.42, cy + Math.sin(ai) * r * 0.42);\n    }\n    x.closePath();\n  }\n  _shade(hex, f) {\n    const n = parseInt(hex.slice(1), 16);\n    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;\n    r = Math.min(255, r * f); g = Math.min(255, g * f); b = Math.min(255, b * f);\n    return 'rgb(' + (r | 0) + ',' + (g | 0) + ',' + (b | 0) + ')';\n  }\n  _setup() {\n    const cv = document.getElementById('bgRot');\n    if (!cv) { setTimeout(() => this._setup(), 60); return; }\n    cv.width = 360; cv.height = 640;\n    const ctx = cv.getContext('2d');\n    this._cfg = {\n      W: 360, H: 640,\n      bands: [\n        { y: 70, h: 130, col: '#13294f', amp: 30, freq: 0.020, sp: 0.5, ph: 0.0 },\n        { y: 200, h: 88, col: '#B22234', amp: 34, freq: 0.024, sp: 0.72, ph: 1.1 },\n        { y: 285, h: 64, col: '#f4f6fb', amp: 26, freq: 0.027, sp: 0.6, ph: 2.2 },\n        { y: 350, h: 92, col: '#1d4ea0', amp: 34, freq: 0.022, sp: 0.82, ph: 3.0 },\n        { y: 440, h: 140, col: '#0a1f3d', amp: 24, freq: 0.019, sp: 0.5, ph: 4.0 },\n        { y: 580, h: 130, col: '#13294f', amp: 30, freq: 0.021, sp: 0.6, ph: 5.0 },\n      ],\n      stars: this._mkStars(42, 360, 640),\n    };\n    const start = performance.now();\n    const loop = (now) => {\n      this._draw(ctx, (now - start) / 1000, this._cfg);\n      this._raf = requestAnimationFrame(loop);\n    };\n    this._raf = requestAnimationFrame(loop);\n  }\n  _draw(ctx, t, cfg) {\n    const x0 = -40, x1 = cfg.W + 40;\n    ctx.globalCompositeOperation = 'source-over';\n    ctx.fillStyle = '#081428'; ctx.fillRect(0, 0, cfg.W, cfg.H);\n    for (const b of cfg.bands) {\n      ctx.beginPath();\n      ctx.moveTo(x0, b.y + Math.sin(x0 * b.freq + t * b.sp + b.ph) * b.amp);\n      for (let x = x0; x <= x1; x += 8) ctx.lineTo(x, b.y + Math.sin(x * b.freq + t * b.sp + b.ph) * b.amp);\n      for (let x = x1; x >= x0; x -= 8) ctx.lineTo(x, b.y + b.h + Math.sin(x * b.freq + t * b.sp + b.ph + 0.7) * b.amp * 0.8);\n      ctx.closePath();\n      const g = ctx.createLinearGradient(0, b.y - b.amp, 0, b.y + b.h + b.amp);\n      g.addColorStop(0, this._shade(b.col, 1.18));\n      g.addColorStop(0.5, b.col);\n      g.addColorStop(1, this._shade(b.col, 0.74));\n      ctx.fillStyle = g; ctx.globalAlpha = 0.97; ctx.fill();\n    }\n    ctx.globalAlpha = 1;\n    for (const s of cfg.stars) {\n      ctx.globalAlpha = 0.32 + 0.4 * (0.5 + 0.5 * Math.sin(t * 1.4 + s.ph));\n      ctx.fillStyle = 'rgba(255,255,255,0.92)';\n      this._star(ctx, s.x, s.y, s.r); ctx.fill();\n    }\n    ctx.globalAlpha = 1;\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
